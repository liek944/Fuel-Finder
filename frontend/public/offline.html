<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fuel Finder – Offline</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial, "Noto Sans", sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
      .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      .card { background: white; max-width: 520px; width: 100%; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); padding: 24px; }
      .title { display: flex; align-items: center; gap: 10px; margin: 0 0 8px; font-weight: 800; font-size: 22px; }
      .muted { color: #6b7280; font-size: 14px; }
      .cta { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
      .btn { background: #2563eb; color: white; border: 0; border-radius: 8px; padding: 10px 14px; cursor: pointer; font-weight: 600; }
      .btn:disabled { opacity: .7; cursor: not-allowed; }
      ul { margin: 12px 0 0 18px; color: #4b5563; }
      code { background:#f3f4f6; padding:2px 6px; border-radius:6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1 class="title">⛽ Fuel Finder</h1>
        <p class="muted">You're offline. Limited functionality is available.</p>
        <ul>
          <li>Previously viewed map tiles may still be visible.</li>
          <li>Last known station and route data may be shown when you revisit pages.</li>
          <li>Live searches and new routes require connectivity.</li>
        </ul>
        <div class="cta">
          <button class="btn" onclick="location.reload()">Retry Connection</button>
          <button class="btn" onclick="history.back()">Go Back</button>
        </div>
      </div>
    </div>
  </body>
</html>
